<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - AppEventotech</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/global.css">
</head>
<body class="bg-light">

<header class="d-flex flex-column align-items-center mt-4 pb-4 border-bottom">
    <img src="/images/logo_evento_tech.png" alt="Logo do Evento" width="200" class="mb-3">

    <nav class="d-flex gap-3">
        <a href="/index.html" class="btn btn-outline-primary fw-semibold">Página Inicial</a>
        <a href="/inscricao.html" class="btn btn-primary fw-semibold shadow-sm">Fazer Inscrição</a>
        <a href="/fale-conosco.html" class="btn btn-outline-primary fw-semibold">Fale Conosco</a>
    </nav>
</header>

<main class="pb-5 container">
    <div class="d-flex justify-content-center align-items-center flex-column mt-5">

        <h2 class="fw-bold text-dark">Faça sua inscrição</h2>
        <p class="text-muted">Preencha seus dados para garantir a vaga.</p>

        <div class="card shadow border-0 mt-3" style="width: 100%; max-width: 450px;">
            <div class="card-body p-4">

                <form id="formInscricao">
                    <div class="mb-3 text-start">
                        <label for="name" class="form-label fw-medium text-secondary">Nome Completo</label>
                        <input type="text" class="form-control bg-light" id="name" placeholder="Ex: José Marcos" required>
                    </div>

                    <div class="mb-3 text-start">
                        <label for="email" class="form-label fw-medium text-secondary">E-mail</label>
                        <input type="email" class="form-control bg-light" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>

                    <div class="mb-4 text-start">
                        <label for="phone" class="form-label fw-medium text-secondary">Telefone</label>
                        <input type="text" class="form-control bg-light" id="phone" placeholder="(00) 00000-0000" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                        Confirmar inscrição
                    </button>
                </form>

                <div id="mensagem" class="mt-3 text-center fw-semibold"></div>

            </div>
        </div>

    </div>

    <section class="mt-5 pt-5 border-top">
        <h3 class="text-center mb-4 fw-bold text-dark">O que vai rolar no Evento Tech</h3>

        <div class="row text-center g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <img src="/images/hackathon.jpeg" alt="Hackathon" class="card-img-top rounded-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="fw-bold">Hackathon</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <img src="/images/palestras.jpg" alt="Palestras" class="card-img-top rounded-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="fw-bold">Palestras</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <img src="/images/workshops.jpeg" alt="Workshops" class="card-img-top rounded-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="fw-bold">Workshops</h5>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="/js/inscricao.js"></script>

</body>
</html>
