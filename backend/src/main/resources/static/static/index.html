<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Inscrição</title>
</head>
<body>

<main class="pb-5">
    <div class="d-flex justify-content-center align-items-center flex-column mt-5">

        <h2><strong>Faça sua inscrição</strong></h2>
        <p>Preencha seus dados para garantir a vaga.</p>

        <div class="card w-25 mt-3">
            <div class="card-body text-center">

                <form id="formInscricao">

                    <input type="text" class="form-control mb-3" id="name" placeholder="Nome Completo" required>
                    <input type="email" class="form-control mb-3" id="email" placeholder="E-mail" required>
                    <input type="text" class="form-control mb-3" id="phone" placeholder="Telefone" required>

                    <button type="submit" class="btn btn-primary w-100">
                        Confirmar inscrição
                    </button>
                </form>

                <div id="mensagem" class="mt-3"></div>

            </div>
        </div>

    </div>
</main>

<!-- JS separado -->
<script src="js/inscricao.js"></script>

</body>
</html>
