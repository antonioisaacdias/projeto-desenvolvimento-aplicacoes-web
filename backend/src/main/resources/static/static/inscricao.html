<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <title>Inscrição</title>
</head>
<body>

<main class="pb-5">
    <div class="d-flex justify-content-center align-items-center flex-column mt-5">

        <h2><strong>Faça sua inscrição</strong></h2>
        <p>Preencha seus dados para garantir a vaga.</p>

        <div class="card w-25 mt-3">
            <div class="card-body text-center">

                <!-- FORM COM ID -->
                <form id="formInscricao">

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" id="name" placeholder="Nome Completo" required>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" id="email" placeholder="E-mail" required>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-telephone"></i>
                        </span>
                        <input type="text" class="form-control" id="phone" placeholder="Telefone" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Confirmar inscrição
                    </button>
                </form>

                <!-- MENSAGEM -->
                <div id="mensagem" class="mt-3"></div>

            </div>
        </div>

    </div>
</main>

<!-- JS -->
<script>
    const form = document.getElementById("formInscricao");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const dados = {
            nome: document.getElementById("name").value,
            email: document.getElementById("email").value,
            telefone: document.getElementById("phone").value
        };

        try {
            const response = await fetch("http://localhost:8080/inscricoes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                mensagem.innerHTML = `<div class="alert alert-success">Inscrição realizada com sucesso!</div>`;
                form.reset();
            } else {
                mensagem.innerHTML = `<div class="alert alert-danger">Erro ao enviar inscrição</div>`;
            }

        } catch (error) {
            console.error(error);
            mensagem.innerHTML = `<div class="alert alert-danger">Erro ao conectar com o servidor</div>`;
        }
    });
</script>

</body>
</html>
