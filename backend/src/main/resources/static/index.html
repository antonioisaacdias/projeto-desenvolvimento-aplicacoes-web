<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento Tech</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte mais forte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- SEU CSS -->
    <link rel="stylesheet" href="/css/style.css?v=3">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
        }

        /* HERO FULL */
        #inicio {
            height: 100vh;
            background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
            url('https://images.unsplash.com/photo-1518770660439-4636190af475');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }

        #inicio h1 {
            font-size: 5rem;
            font-weight: 900;
        }

        #inicio p {
            font-size: 1.4rem;
            opacity: 0.85;
        }

        header {
            position: absolute;
            width: 100%;
            top: 0;
            padding: 20px 0;
            z-index: 10;
        }

        header img {
            width: 240px;
            filter: brightness(0) invert(1);
        }

        /* BOTÃO MELHOR */
        .btn-primary {
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border: none;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124,58,237,0.5);
        }

        /* INSCRIÇÃO */
        #inscricao {
            padding: 100px 20px;
            text-align: center;
        }

        .card {
            max-width: 420px;
            margin: auto;
            border-radius: 20px;
            padding: 30px;
            background: #ffffff;
            color: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .form-control {
            height: 55px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        /* EVENTOS */
        #eventos {
            padding: 100px 20px;
            background: #0f172a;
        }

        #eventos h3 {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
        }

        #eventos img {
            border-radius: 15px;
            transition: 0.3s;
        }

        #eventos img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<header>
    <div class="container d-flex flex-column align-items-center">
        <img src="/images/logo_evento_tech.png" alt="Logo Evento Tech">

        <nav class="d-flex gap-3 mt-3 flex-wrap justify-content-center">
            <a href="#inicio" class="btn btn-outline-light">Início</a>
            <a href="#inscricao" class="btn btn-primary">Inscrição</a>
            <a href="#eventos" class="btn btn-outline-light">Eventos</a>
        </nav>
    </div>
</header>

<main>

    <!-- HERO -->
    <section id="inicio" class="text-center">
        <div class="container">
            <h1>EVENTO TECH</h1>
            <p>O maior encontro de tecnologia e inovação da região</p>
            <a href="#inscricao" class="btn btn-primary mt-4 px-5 py-3">
                Quero participar
            </a>
        </div>
    </section>

    <!-- INSCRIÇÃO -->
    <section id="inscricao">

        <h2><strong>Faça sua inscrição</strong></h2>
        <p class="text-muted mb-4">Garanta sua vaga no evento</p>

        <div class="card">
            <form id="formInscricao">

                <!-- MANTIVE TODOS OS IDs (IMPORTANTE) -->
                <input type="text" class="form-control" id="name" placeholder="Nome completo" required>

                <input type="email" class="form-control" id="email" placeholder="E-mail" required>

                <input type="text" class="form-control" id="phone" placeholder="Telefone" required>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Confirmar inscrição
                </button>

            </form>

            <!-- MANTIVE ID -->
            <div id="mensagem" class="mt-3"></div>
        </div>

    </section>

    <!-- EVENTOS -->
    <section id="eventos">
        <div class="container">

            <h3>O que vai rolar</h3>

            <div class="row text-center mt-5">

                <div class="col-md-4 mb-4">
                    <img src="/images/hackathon.jpeg" class="img-fluid">
                    <h5 class="mt-3">Hackathon</h5>
                    <p>Maratona de programação</p>
                </div>

                <div class="col-md-4 mb-4">
                    <img src="/images/palestras.jpg" class="img-fluid">
                    <h5 class="mt-3">Palestras</h5>
                    <p>Especialistas do mercado</p>
                </div>

                <div class="col-md-4 mb-4">
                    <img src="/images/workshops.jpeg" class="img-fluid">
                    <h5 class="mt-3">Workshops</h5>
                    <p>Aprenda na prática</p>
                </div>

            </div>
        </div>
    </section>

</main>

<script src="/js/inscricao.js"></script>

</body>
</html>
