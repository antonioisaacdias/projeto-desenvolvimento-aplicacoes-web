<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/frontend/styles/global.css">
    <title>Inscrição</title>
</head>

<body>

    <header class="header ">
        <p class="titulo p-2 ps-4">Evento Tech</p>
    </header>

    <main>
        <div class="d-flex justify-content-center align-items-center flex-column mt-5">
            <h2 class="p-2">
                <strong>Fale conosco</strong>
            </h2>

            <p class="p-1">
                Envie sua dúvida ou mensagem.
            </p>

            <div class="card w-25 mt-3">
                <div class="card-body text-start w-100">
                    <form action="#" method="POST" class="py-3">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="name" placeholder="Nome Completo" name="name"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" placeholder="E-mail" name="email"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="mensagem" class="form-label">Mensagem</label>
                            <input type="text" class="form-control pb-5" id="mensagem" placeholder="Mensagem"
                                name="mensagem" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Confirmar inscrição</button>

                    </form>
                </div>
            </div>

            <div class="w-25 text-start mt-4">
                <div class="d-flex align-items-start mb-3">
                    <i class="bi bi-envelope me-2" style="font-size: 1.5rem;"></i>
                    <div>
                        <h5 class="mb-1">Email</h5>
                        <p class="mb-0">
                            email@eventotech.com
                        </p>
                    </div>
                </div>
                <div class="d-flex align-items-start mb-3">
                    <i class="bi bi-telephone me-2" style="font-size: 1.5rem;"></i>
                    <div>
                        <h5 class="mb-1">Telefone</h5>
                        <p class="mb-0">
                            (+176) 3622-9938
                        </p>
                    </div>
                </div>
                <div class="d-flex align-items-start">
                    <i class="bi bi-geo-alt me-2" style="font-size: 1.5rem;"></i>
                    <div>
                        <h5 class="mb-1">Endereço</h5>
                        <p class="mb-0">
                            Endereço Rua Rabih - 1 Unipê
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
