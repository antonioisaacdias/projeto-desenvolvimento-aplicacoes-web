<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/frontend/styles/global.css">
    <title>Inscrição</title>
</head>
<body>

    <header class="header ">
        <p class="titulo p-2 ps-4">Evento Tech</p>
    </header>

    <main>
        <div class="d-flex justify-content-center align-items-center flex-column mt-5">
            <h2 class="p-2">
                <strong>Faça sua inscrição</strong>
            </h2>

            <p class="p-1">
                Preencha seus dados para garantir a vaga.
            </p>

            <div class="card w-25 mt-3">
                <div class="card-body text-center w-100">
                    <form action="#" method="POST" class="py-3">
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="name" placeholder="Nome Completo" name="name" required>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="E-mail" name="email" required>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-telephone"></i>
                            </span>
                            <input type="text" class="form-control" id="phone" placeholder="Telefone" name="phone" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Confirmar inscrição</button>
                    </form>
                </div>
            </div>

            <h2 class="p-3" style="margin-top: 7rem;">
                Obrigado!
            </h2>

            <p>
                Um e-mail de confirmação já foi enviado.
            </p>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
